<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>isokoLink - Sign Up</title>
<link rel="icon" type="image/png" href="../images/logo/icon.png" />
<link rel="stylesheet" href="signup.css">
</head>

<body>

<div class="hero-bg" id="bg-0"></div>
<div class="hero-bg" id="bg-1"></div>
<div class="hero-bg" id="bg-2"></div>
<div class="hero-bg" id="bg-3"></div>
<div class="hero-bg" id="bg-4"></div>
<div class="hero-bg" id="bg-5"></div>
<div class="hero-overlay"></div>

<div class="container">

    <div class="card">
        <img src="../images/logo/icon.png" alt="isokoLink" class="brand-logo">
        <h2>Create Account</h2>
        <p>Join isokoLink today</p>

        <form id="signupForm">

            <!-- Name -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>

            <!-- Location -->
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="City / District" required>
            </div>

            <!-- Contact -->
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label>Account Type</label>
                <select id="role" required>
                    <option value="">Select</option>
                    <option value="farmer">Farmer(Producer)</option>
                    <option value="buyer">Buyer(Consumer)</option>
                </select>
            </div>

            <!-- Conditional Field -->
            <div class="form-group hidden" id="extraField">
                <label>School / Institution Name</label>
                <input type="text" id="extraInfo">
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <p id="error" class="error"></p>

            <button type="submit">Sign Up</button>

        </form>

        <p>
            Already have an account?
            <a href="../login/login.html">Login</a>
        </p>
    </div>

</div>

<script src="../js/config.js"></script>
<script src="signup.js"></script>
<script>
    const BG_IMAGES = [
        '../images/famers/108174.jpg',
        '../images/famers/Malawi-Bill-Burke.jpg',
        '../images/famers/RS25698_Godfrey-Kirimi-displays-tomoatoes-from-his-farm-in-Tharaka-Nithi.-Photo-credit-Farm-Africa-Bertha-Lutome_lpr.jpg',
        '../images/famers/female-african-farmer-using-her-phone-photo.jpg',
        '../images/famers/istockphoto-2158596330-612x612.jpg',
        '../images/famers/vendor-selling-carrots.webp'
    ];
    const INTERVAL_MS = 6000;
    const backgrounds = Array.from(document.querySelectorAll('.hero-bg'));
    backgrounds.forEach((el, i) => { el.style.backgroundImage = `url('${BG_IMAGES[i]}')`; });
    let currentIndex = 0;
    backgrounds[0].classList.add('active');
    setInterval(() => {
        backgrounds[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % backgrounds.length;
        backgrounds[currentIndex].classList.add('active');
    }, INTERVAL_MS);
</script>
</body>
</html>

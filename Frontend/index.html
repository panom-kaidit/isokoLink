<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isokoLink</title>
    <link rel="icon" type="image/png" href="./images/logo/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/landing.css">
</head>
<body>

<div class="landing-container">

    <!-- ═══════════════════════════════════════════════
         BACKGROUND CAROUSEL IMAGES
         Swap these URLs for your own local image paths:
           url('./images/farm1.jpg')
           url('./images/farm2.jpg')
           url('./images/farm3.jpg')
           url('./images/farm4.jpg')
    ═══════════════════════════════════════════════ -->
    <div class="hero-bg" id="bg-0"></div>
    <div class="hero-bg" id="bg-1"></div>
    <div class="hero-bg" id="bg-2"></div>
    <div class="hero-bg" id="bg-3"></div>
    <div class="hero-bg" id="bg-4"></div>
    <div class="hero-bg" id="bg-5"></div>

    <!-- Dark overlay so text stays readable over any photo -->
    <div class="hero-overlay"></div>

    <!-- ═══════════════════════════════════════════════
         MAIN CONTENT — sits above images + overlay
    ═══════════════════════════════════════════════ -->
    <div class="hero">

        <img src="./images/logo/icon.png" alt="isokoLink Logo">

        <h1>Welcome</h1>

        <!-- Subtitle rotates with each background image -->
        <p class="hero-subtitle" id="hero-subtitle">
            IsokoLink connects farmers directly to buyers — eliminating middlemen, ensuring fair prices,
            and making fresh food more accessible for everyone. Discover, trade, and grow together in one simple platform.
        </p>

        <div class="buttons">
            <a href="./login/login.html">
                <button>Sign In</button>
            </a>
            <a href="./signup/signup.html">
                <button class="outline">Create Account</button>
            </a>
        </div>

        <!-- Dot indicators — auto-generated by JS -->
        <div class="carousel-dots" id="carousel-dots"></div>

    </div>

</div>

<script>
    // ═══════════════════════════════════════════════════════════════
    //  EDIT THESE FOUR SUBTITLES — one per background image
    // ═══════════════════════════════════════════════════════════════
    const SUBTITLES = [
        // Slide 1 — Clean & Professional
        "IsokoLink connects farmers directly to buyers — eliminating middlemen, ensuring fair prices, and making fresh food more accessible for everyone. Discover, trade, and grow together in one simple platform.",

        // Slide 2 — Persuasive / Marketing
        "Buy fresh. Sell smarter. Grow faster. IsokoLink empowers farmers to reach real buyers instantly while giving schools, restaurants, and businesses access to affordable, high-quality produce — all in one seamless marketplace.",

        // Slide 3 — Impact-Focused
        "Transforming agriculture through connection. IsokoLink bridges the gap between farmers and buyers, reducing food waste, increasing transparency, and strengthening local economies — one transaction at a time.",

        // Slide 4 — Bold Startup
        "No middlemen. No guesswork. Just real connections. IsokoLink is your digital marketplace for buying and selling fresh produce — faster, fairer, and smarter."
    ];

    // ═══════════════════════════════════════════════════════════════
    //  BACKGROUND IMAGE URLS — swap for your own local paths
    // ═══════════════════════════════════════════════════════════════
    const BG_IMAGES = [
        './images/famers/108174.jpg',
        './images/famers/Malawi-Bill-Burke.jpg',
        './images/famers/RS25698_Godfrey-Kirimi-displays-tomoatoes-from-his-farm-in-Tharaka-Nithi.-Photo-credit-Farm-Africa-Bertha-Lutome_lpr.jpg',
        './images/famers/female-african-farmer-using-her-phone-photo.jpg',
        './images/famers/istockphoto-2158596330-612x612.jpg',
        './images/famers/vendor-selling-carrots.webp'
    ];

    const INTERVAL_MS = 6000; // milliseconds per slide

    // ── Wire up images ────────────────────────────────────────────
    const backgrounds = Array.from(document.querySelectorAll('.hero-bg'));
    backgrounds.forEach((el, i) => {
        el.style.backgroundImage = `url('${BG_IMAGES[i]}')`;
    });

    const subtitleEl = document.getElementById('hero-subtitle');
    const dotsWrap   = document.getElementById('carousel-dots');

    let currentIndex = 0;
    let timer;

    // ── Build dot indicators ──────────────────────────────────────
    backgrounds.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className   = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Slide ${i + 1}`);
        dot.addEventListener('click', () => goTo(i));
        dotsWrap.appendChild(dot);
    });

    function getDots() {
        return Array.from(dotsWrap.querySelectorAll('.dot'));
    }

    // ── Navigate to a specific slide ──────────────────────────────
    function goTo(index) {
        backgrounds[currentIndex].classList.remove('active');
        getDots()[currentIndex].classList.remove('active');

        currentIndex = index;

        backgrounds[currentIndex].classList.add('active');
        getDots()[currentIndex].classList.add('active');

        // Fade subtitle out → swap text → fade back in
        subtitleEl.classList.add('fading');
        setTimeout(() => {
            subtitleEl.textContent = SUBTITLES[currentIndex] || '';
            subtitleEl.classList.remove('fading');
        }, 500);

        // Reset auto-play after manual dot click
        clearInterval(timer);
        startTimer();
    }

    function next() {
        goTo((currentIndex + 1) % backgrounds.length);
    }

    function startTimer() {
        timer = setInterval(next, INTERVAL_MS);
    }

    // ── Start ─────────────────────────────────────────────────────
    backgrounds[0].classList.add('active');
    startTimer();
</script>

</body>
</html>

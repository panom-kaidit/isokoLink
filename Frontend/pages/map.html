<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>isokoLink — Map</title>
  <link rel="icon" type="image/png" href="../images/logo/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/map.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body data-page="map">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="brand-mark"><img src="../images/logo/icon.png" alt="isokoLink"></div>
        <div>
          <h2>isokoLink</h2>
          <p>Map view</p>
        </div>
      </div>
      <nav class="sidebar__menu">
        <a class="menu-link" data-page="marketplace" href="marketplace.html"><span class="icon"><i class="fa-solid fa-cart-shopping"></i></span>Marketplace</a>
        <a class="menu-link" data-page="map" href="map.html"><span class="icon"><i class="fa-solid fa-map"></i></span>Map View</a>
        <a class="menu-link" data-page="requests" href="requests.html"><span class="icon"><i class="fa-solid fa-inbox"></i></span>My Requests</a>
        <a class="menu-link" data-page="messages" href="messages.html"><span class="icon"><i class="fa-solid fa-message"></i></span>Messages</a>
      </nav>
    </aside>

    <main class="main--content">
      <header class="header">
        <div class="header--wrapper">
          <button class="icon-btn" id="sidebarToggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
          <div class="header-actions">
            <button class="icon-btn" title="Notifications"><i class="fa-regular fa-bell"></i></button>
            <div class="avatar" id="user-avatar">--</div>
          </div>
        </div>
      </header>

      <section class="content-shell">
        <div>
          <h1 class="page-title" id="map-title">Map View</h1>
          <p class="page-subtitle" id="map-subtitle">See nearby farmers and available produce.</p>
          <p class="card-detail" id="map-count"></p>
        </div>

        <div class="map-shell">
          <div class="map-list">
            <header id="map-list-title" style="padding:14px 14px 10px;font-weight:700;font-size:1rem;color:#1a1a1a;border-bottom:1px solid #e0e0e0;background:#fff;">
              <i class="fa-solid fa-map-location-dot" style="color:#2e7d32;margin-right:6px;"></i>
              Nearby Results
            </header>
            <div class="map-filters" style="display:flex;flex-direction:column;gap:8px;padding:10px 12px;background:#f9f9f9;border-bottom:1px solid #e0e0e0;">
              <input
                id="map-search"
                type="search"
                placeholder="Search farmer name or crop..."
                style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:0.85rem;box-sizing:border-box;" />
              <div style="display:flex;gap:8px;">
                <select id="map-crop-filter" style="flex:1;padding:7px 8px;border:1px solid #ddd;border-radius:6px;font-size:0.82rem;">
                  <option value="">All Crops</option>
                  <option>Maize</option>
                  <option>Beans</option>
                  <option>Tomatoes</option>
                  <option>Bananas (Matooke)</option>
                  <option>Sweet Potatoes</option>
                  <option>Groundnuts</option>
                  <option>Coffee (Robusta)</option>
                  <option>Coffee (Arabica)</option>
                  <option>Cassava</option>
                  <option>Sorghum</option>
                  <option>Onions</option>
                  <option>Rice</option>
                  <option>Tea</option>
                  <option>Sugarcane</option>
                </select>
                <select id="map-region-filter" style="flex:1;padding:7px 8px;border:1px solid #ddd;border-radius:6px;font-size:0.82rem;">
                  <option value="">All Countries</option>
                  <optgroup label="Uganda">
                    <option>Central</option>
                    <option>Western</option>
                    <option>Northern</option>
                    <option>Eastern</option>
                  </optgroup>
                  <optgroup label="Kenya">
                    <option>Nairobi</option>
                    <option>Rift Valley</option>
                    <option>Coast</option>
                    <option>Western Kenya</option>
                  </optgroup>
                  <optgroup label="Tanzania">
                    <option>Dar es Salaam</option>
                    <option>Arusha</option>
                    <option>Mwanza</option>
                    <option>Dodoma</option>
                  </optgroup>
                  <optgroup label="Rwanda">
                    <option>Kigali</option>
                    <option>Southern Province</option>
                    <option>Northern Province</option>
                    <option>Eastern Province</option>
                    <option>Western Province</option>
                  </optgroup>
                  <optgroup label="Other">
                    <option>Burundi</option>
                    <option>South Sudan</option>
                    <option>DRC</option>
                  </optgroup>
                </select>
              </div>
            </div>
            <div class="map-scroll" id="map-list-items"></div>
          </div>
          <div id="leaflet-map"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/layout.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/map.js"></script>
</body>
</html>

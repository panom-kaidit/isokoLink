<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>isokoLink — My Requests</title>
  <link rel="icon" type="image/png" href="../images/logo/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body data-page="requests">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="brand-mark"><img src="../images/logo/icon.png" alt="isokoLink"></div>
        <div>
          <h2>isokoLink</h2>
          <p>Requests</p>
        </div>
      </div>
      <nav class="sidebar__menu">
        <a class="menu-link" data-page="marketplace" href="marketplace.html"><span class="icon"><i class="fa-solid fa-cart-shopping"></i></span>Marketplace</a>
        <a class="menu-link" data-page="map" href="map.html"><span class="icon"><i class="fa-solid fa-map"></i></span>Map View</a>
        <a class="menu-link" data-page="requests" href="requests.html"><span class="icon"><i class="fa-solid fa-inbox"></i></span>My Requests</a>
        <a class="menu-link" data-page="messages" href="messages.html"><span class="icon"><i class="fa-solid fa-message"></i></span>Messages</a>
      </nav>
    </aside>

    <main class="main--content">
      <header class="header">
        <div class="header--wrapper">
          <button class="icon-btn" id="sidebarToggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
          <div class="header-actions">
            <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
            <div class="avatar" id="user-avatar">--</div>
          </div>
        </div>
      </header>

      <section class="content-shell">
        <div class="section-header">
          <div>
            <h1 class="page-title">My Requests</h1>
            <p class="page-subtitle">Track every purchase request you have sent to farmers.</p>
          </div>
          <a href="marketplace.html" class="btn btn-primary buyer-only">+ New Request</a>
        </div>

        <div class="filter-bar">
          <div class="filter-group">
            <label for="status-filter">Filter by Status</label>
            <select id="status-filter" onchange="filterRequests()">
              <option value="">All</option>
              <option value="Pending">Pending</option>
              <option value="Accepted">Accepted</option>
              <option value="Completed">Completed</option>
              <option value="Declined">Declined</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sort-requests">Sort By</label>
            <select id="sort-requests" onchange="filterRequests()">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
          <div class="filter-group">
            <label>&nbsp;</label>
            <div class="flex gap-10">
              <button class="btn btn-primary btn-sm" id="view-cards-btn" onclick="setView('cards')">Cards</button>
              <button class="btn btn-outline btn-sm" id="view-table-btn" onclick="setView('table')">Table</button>
            </div>
          </div>
        </div>

        <div id="req-alert" class="alert hidden"></div>

        <div id="requests-container">
          <div class="loading">Loading your requests...</div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/requests.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Products — isokoLink</title>
  <link rel="icon" type="image/png" href="../images/logo/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body data-page="products">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="brand-mark"><img src="../images/logo/icon.png" alt="isokoLink"></div>
        <div>
          <h2>isokoLink</h2>
          <p>Farmer module</p>
        </div>
      </div>
      <nav class="sidebar__menu">
        <a class="menu-link" data-page="marketplace" href="marketplace.html"><span class="icon"><i class="fa-solid fa-cart-shopping"></i></span>Marketplace</a>
        <a class="menu-link" data-page="map" href="map.html"><span class="icon"><i class="fa-solid fa-map"></i></span>Map View</a>
        <a class="menu-link" data-page="requests" href="requests.html"><span class="icon"><i class="fa-solid fa-inbox"></i></span>Requests</a>
        <a class="menu-link" data-page="messages" href="messages.html"><span class="icon"><i class="fa-solid fa-message"></i></span>Messages</a>
      </nav>
    </aside>

    <main class="main--content">
      <header class="header">
        <div class="header--wrapper">
          <button class="icon-btn" id="sidebarToggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
          <div class="header-actions">
            <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
            <div class="avatar" id="user-avatar">--</div>
          </div>
        </div>
      </header>

      <section class="content-shell">
        <div class="section-header">
          <div>
            <h1 class="page-title">My Products</h1>
            <p class="page-subtitle">Manage what buyers can see.</p>
          </div>
          <a class="btn btn-primary" href="add-product.html">+ Add Product</a>
        </div>

        <div class="table-shell">
          <table class="table">
            <thead>
              <tr><th>Product</th><th>Price</th><th>Location</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="products-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
